<body>
    <h1>JavaScript Cnditional Statements</h1>

    <h2>Check Age Classification</h2>
    <br>
    <buttom class="btn btn-info" onclick="checkAge()">Click Age</buttom>

    <script>
        function checkAge(){
            var age = 15; 
            if(isNaN(age) || age < 0){
                alert("Please input a valid number.");
            }

            else if(age<18){
                alert("You are of underaged");
            }

            else if(age>=18){
                alert("You are of legal age.");
            }

            else{
                alert("Age could not be classified")
            }
        }
    </script>
</body>
